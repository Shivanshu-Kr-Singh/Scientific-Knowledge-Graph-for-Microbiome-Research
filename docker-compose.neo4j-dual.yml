version: '3.8'

# Docker Compose configuration for dual Neo4j instances during migration
# This setup maintains both old and new Neo4j databases for safe migration with rollback capability
#
# Usage:
#   docker-compose -f docker-compose.neo4j-dual.yml up -d
#
# Requirements: 16.4 - Maintain old Neo4j database instance as rollback option

services:
  # Old Neo4j database (original flat schema)
  # This instance is maintained for rollback capability
  neo4j-old:
    image: neo4j:5.13
    container_name: neo4j-old
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # HTTP browser interface
    environment:
      - NEO4J_AUTH=neo4j/microbiome2024
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j-old-data:/data
      - neo4j-old-logs:/logs
      - neo4j-old-import:/var/lib/neo4j/import
      - neo4j-old-plugins:/plugins
    networks:
      - neo4j-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "microbiome2024", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # New Neo4j database (enhanced semantic schema)
  # This instance receives the migrated data with enhanced provenance
  neo4j-new:
    image: neo4j:5.13
    container_name: neo4j-new
    ports:
      - "7688:7687"  # Bolt protocol (mapped to different host port)
      - "7475:7474"  # HTTP browser interface (mapped to different host port)
    environment:
      - NEO4J_AUTH=neo4j/microbiome2024
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j-new-data:/data
      - neo4j-new-logs:/logs
      - neo4j-new-import:/var/lib/neo4j/import
      - neo4j-new-plugins:/plugins
    networks:
      - neo4j-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "microbiome2024", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # Old database volumes
  neo4j-old-data:
    driver: local
  neo4j-old-logs:
    driver: local
  neo4j-old-import:
    driver: local
  neo4j-old-plugins:
    driver: local
  
  # New database volumes
  neo4j-new-data:
    driver: local
  neo4j-new-logs:
    driver: local
  neo4j-new-import:
    driver: local
  neo4j-new-plugins:
    driver: local

networks:
  neo4j-network:
    driver: bridge

# Access URLs:
# - Old database browser: http://localhost:7474
# - New database browser: http://localhost:7475
# - Old database bolt: bolt://localhost:7687
# - New database bolt: bolt://localhost:7688
#
# Update your .env file with:
# NEO4J_URI=bolt://localhost:7687
# NEO4J_NEW_URI=bolt://localhost:7688
# NEO4J_USER=neo4j
# NEO4J_PASSWORD=your_password
# NEO4J_NEW_USER=neo4j
# NEO4J_NEW_PASSWORD=your_password
