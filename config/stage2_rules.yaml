# config/stage2_rules.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Weighted keyword rule scorer configuration.
# Used exclusively by: collectors/relevance_filter.py
# Scale target: 300,000+ PubMed / Europe PMC / Semantic Scholar papers
#
# WHAT THIS FILE CONTROLS:
#   text = (title + abstract + mesh_terms + keywords + article_types + journal).lower()
#   Weights are summed, clamped
#   to [−1.0, 1.5], then normalised to [0.0, 1.0].
#
#   Score ≥ 0.70  → confident keep  (skips ML entirely)
#   Score 0.40–0.69 → borderline    (sent to Stage 3 ML)
#   Score < 0.40  → confident reject (skips ML)
#
# HOW TO UPDATE:
#   - Add new positive phrases under positive_terms with an appropriate weight
#   - Add new negative phrases under negative_terms with a negative weight
#   - Multi-word phrases are matched before single words (longest-first) —
#     no special action needed when adding multi-word phrases
#   - Do NOT add MeSH headings here — those belong in stage1_mesh.yaml
#
# WEIGHT GUIDE (positive_terms):
#   0.60–0.80 → very strong signal (human microbiome, specific sequencing)
#   0.40–0.59 → strong signal (gut microbiota, clinical study designs)
#   0.20–0.39 → supporting signal (body sites, diseases, cohort keywords)
#   0.10–0.19 → weak but positive (general terms like "gut", "stool")
#
# WEIGHT GUIDE (negative_terms):
#   -0.80 to -1.0 → confident off-topic (soil, zebrafish, gnotobiotic)
#   -0.50 to -0.79 → likely off-topic (animal models, aquatic, industrial)
#   -0.20 to -0.49 → contextual penalty (may still be relevant with other signals)
# ─────────────────────────────────────────────────────────────────────────────


