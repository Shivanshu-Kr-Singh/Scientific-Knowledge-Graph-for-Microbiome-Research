# ── Scoring thresholds ────────────────────────────────────────────────────────
thresholds:
  keep:   0.70   # Normalised score ≥ 0.70 → confident keep, skip ML
  review: 0.40   # Normalised score 0.40–0.69 → borderline, send to Stage 3 ML
  reject: 0.40   # Normalised score < 0.40 → confident reject, skip ML


# ── Metagenomics gate ─────────────────────────────────────────────────────────
# Applied after Stage 2 scoring. Paper must mention at least one term below
# to pass — enforces the project goal: metagenomics + data availability only.
# Set enabled: false for broader literature collection runs.
metagenomics_gate:
  enabled: true
  terms:
    # Sequencing method terms (substring match — "metagenom" catches all variants)
    - "metagenom"
    - "shotgun"
    - "16s"
    - "18s"
    - "its sequencing"
    - "amplicon"
    - "sequencing"
    - "metatranscriptom"
    - "metaproteomic"
    - "whole genome"
    - "wgs"
    - "nanopore"
    - "pacbio"
    - "illumina"
    - "next-generation sequencing"
    - "ngs"
    - "long-read"
    - "short-read"

    # Microbiome core terms
    - "microbiome"
    - "microbiota"
    - "microbial community"
    - "microbial diversity"

    # Diversity metrics (implies sequencing was done)
    - "alpha diversity"
    - "beta diversity"
    - "otu"
    - "asv"
    - "unifrac"

    # Public data repository accession patterns
    - "prjna"
    - "prjeb"
    - "srp"
    - "srr"
    - "err"
    - "drr"
    - "gse"
    - "pxd"
    - "ena"
    - "sra"
    - "mgnify"
    - "mgrast"
    - "bioproject"
    - "fastq"
    - "raw reads"
    - "raw sequences"
