# config/stage1_mesh.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — PubMed MeSH metadata filter configuration.
# Used exclusively by: collectors/metadata_filter.py
# Scale target: 60,000+ PubMed papers
#
# WHAT THIS FILE CONTROLS:
#   Stage 1 makes fast KEEP / REJECT / UNKNOWN decisions using PubMed's
#   human-curated MeSH (Medical Subject Headings) tags before any keyword
#   scoring or ML inference runs. This is the cheapest and most precise stage.
#
# HOW DECISIONS ARE MADE:
#   has microbiome MeSH + human MeSH         → KEEP  (score 0.90)
#   has microbiome MeSH + human + animal     → KEEP  (score 0.70, human wins)
#   has animal MeSH only, no human           → REJECT (score 0.05)
#   has microbiome MeSH, no human/animal     → UNKNOWN → passes to Stage 2
#   no MeSH terms at all                     → UNKNOWN → passes to Stage 2
#
# HOW TO UPDATE:
#   Add new MeSH headings under the correct section. Spelling must match
#   exactly what PubMed assigns (case-insensitive matching is applied in code).
#   Verify spelling at: https://meshb.nlm.nih.gov/treeView
#   Do NOT add keyword phrases here — those belong in stage2_rules.yaml.
#
# MeSH TREE PATHS COVERED:
#   mesh_keep        → B (Organisms) + E (Techniques) + C (Diseases) + G (Phenomena)
#   mesh_human_signal → M (Persons) + N (Health Care) + E (Study designs)
#   mesh_animal_only  → B (Organisms) — all animal taxa with microbiome studies
# ─────────────────────────────────────────────────────────────────────────────


