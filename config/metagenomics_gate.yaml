# ── Metagenomics Gate Configuration ───────────────────────────────────────────
# Applied after Stage 2 scoring. Paper must mention at least one term below
# to pass — enforces the project goal: metagenomics + data availability only.
# All terms use SUBSTRING matching (e.g., "metagenom" catches metagenomics,
# metagenomic, metagenome-assembled, etc.)
#
# Enable/disable is controlled via .env file:
#   METAGENOMICS_GATE_ENABLED=true   (default)
#   METAGENOMICS_GATE_ENABLED=false  (for broader literature collection)

