# config/organisms.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Production-grade term configuration for the 3-stage relevance filter.
# Covers the full MeSH hierarchy for microbiome/metagenomics research.
#
# HOW TO UPDATE:
#   - Add new MeSH terms under the correct section (mesh_keep / mesh_human_signal / mesh_animal_only)
#   - Add keyword variants under positive_terms / negative_terms with appropriate weights
#   - Do NOT touch Python code — this file alone drives Stage 1 and Stage 2
#
# WEIGHT GUIDE (positive_terms):
#   0.60–0.80 → very strong signal (human microbiome, specific sequencing methods)
#   0.40–0.59 → strong signal (gut microbiota, clinical study types)
#   0.20–0.39 → supporting signal (body sites, disease names, cohort keywords)
#   0.10–0.19 → weak but positive (general terms)
#
# WEIGHT GUIDE (negative_terms):
#   -0.80 to -1.0 → confident non-human / off-topic (soil, zebrafish, gnotobiotic)
#   -0.50 to -0.79 → likely non-human (specific animal models, aquatic)
#   -0.20 to -0.49 → contextual penalty (may still be relevant if other signals present)
# ─────────────────────────────────────────────────────────────────────────────


